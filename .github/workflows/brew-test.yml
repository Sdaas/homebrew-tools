name: Brew Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  brew-test:
    runs-on: macos-latest

    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repo
        run: brew tap sdaas/tools https://github.com/Sdaas/homebrew-tools

      - name: Style + audit all formulas
        run: |
          brew style sdaas/tools
          brew audit --tap sdaas/tools --strict

      - name: Install and test each tool
        run: |
          for f in ask decrypt-pdf; do
            echo "::group::$f"
            brew install --build-from-source "sdaas/tools/$f"
            brew test "sdaas/tools/$f"
            echo "::endgroup::"
          done

      - name: Smoke test the tool binaries
        run: |
          ask --version
          decrypt-pdf --version

      - name: Install the meta-formula (pulls in all tools)
        run: brew install sdaas/tools/sdaas-tools
